name: Dependencies
description: Restore the composer dependencies from cache and the static assets built by the "build-static" job

outputs:
    composer-cache-hit:
        description: 'Whether the composer cache was hit exactly (true/false)'
        value: ${{ steps.composer-cache.outputs.cache-hit }}

runs:
    using: composite
    steps:
        - name: Cache composer
          id: composer-cache
          uses: actions/cache@v6
          with:
              path: vendor/
              key: cache-${{ env.CACHE_KEY }}-composer-${{ hashFiles('composer.lock') }}

        - name: Download static assets
          uses: actions/download-artifact@v8
          with:
              name: ${{ env.STATIC_ASSETS_ARTIFACT }}
              path: public/built/
